services:
  db:
    image: postgres:15-alpine
    expose:
      - "5432"
    ports:
      - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: "change-password"
      POSTGRES_DB: "db"
      POSTGRES_USER: "postgres"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 10
  api:
    command: bash -c "uv sync && uv run -- python manage.py migrate && uv run -- python manage.py runserver 0.0.0.0:8000"
    build:
      context: backend
    expose:
      - "8000"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env.backend
    depends_on:
      db:
        condition: service_healthy
  web:
    command: sh -c "pnpm install -r && pnpm --filter web dev"
    build:
      context: frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.pnpm-store
    expose:
      - "3000"
    ports:
      - "3000:3000"
    env_file:
      - .env.frontend
    depends_on:
      - api
  admin:
    command: sh -c "pnpm install -r && pnpm --filter admin dev"
    build:
      context: frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.pnpm-store
    expose:
      - "3001"
    ports:
      - "3001:3001"
    env_file:
      - .env.frontend
    environment:
      - NEXTAUTH_URL=http://localhost:3001
    depends_on:
      - api
